name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: find . -name '*.sh' -print0 | xargs -0 chmod +x

      - name: Validate skills
        run: ./scripts/validate-skills.sh
